<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toastman — AI Interview Practice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f10;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Setup screen ── */
    #setup {
      width: min(540px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .logo {
      text-align: center;
      margin-bottom: 8px;
    }
    .logo h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo p {
      color: #888;
      margin-top: 4px;
      font-size: 0.95rem;
    }

    label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 6px; }

    textarea {
      width: 100%;
      height: 200px;
      background: #1a1a1c;
      border: 1px solid #2e2e30;
      border-radius: 10px;
      color: #e8e8e8;
      padding: 14px;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      line-height: 1.5;
    }
    textarea:focus { border-color: #555; }
    textarea::placeholder { color: #444; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #444;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #2e2e30;
    }

    .hint {
      font-size: 0.8rem;
      color: #555;
      line-height: 1.5;
    }

    .start-btn {
      padding: 13px;
      background: #e8e8e8;
      color: #0f0f10;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .start-btn:hover { background: #fff; }
    .start-btn:active { transform: scale(0.98); }
    .start-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

    /* ── Chat screen ── */
    #chat {
      display: none;
      flex-direction: column;
      width: min(720px, 100vw);
      height: 100dvh;
    }

    #chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid #1e1e20;
      flex-shrink: 0;
    }
    #chat-header .title { font-weight: 600; font-size: 1rem; }
    #restart-btn {
      background: none;
      border: 1px solid #2e2e30;
      color: #888;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #restart-btn:hover { color: #e8e8e8; border-color: #555; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 82%;
      line-height: 1.55;
      font-size: 0.93rem;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1a1a1c;
      border: 1px solid #2a2a2c;
      border-radius: 4px 14px 14px 14px;
      padding: 12px 16px;
    }
    .msg.user {
      align-self: flex-end;
      background: #2a2a40;
      border-radius: 14px 4px 14px 14px;
      padding: 12px 16px;
    }
    .msg.assistant.streaming::after {
      content: "▋";
      animation: blink 0.8s step-end infinite;
      margin-left: 2px;
      opacity: 0.7;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid #1e1e20;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: #1a1a1c;
      border: 1px solid #2e2e30;
      border-radius: 10px;
      color: #e8e8e8;
      padding: 10px 14px;
      font-size: 0.93rem;
      font-family: inherit;
      outline: none;
      resize: none;
      height: 44px;
      max-height: 180px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: #555; }

    #send-btn {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: #e8e8e8;
      color: #0f0f10;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:hover { background: #fff; }
    #send-btn:disabled { background: #2a2a2c; color: #555; cursor: not-allowed; }

    #mic-btn {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: #1a1a1c;
      color: #aaa;
      border: 1px solid #2e2e30;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #mic-btn:hover { color: #e8e8e8; border-color: #555; }
    #mic-btn.listening {
      background: #3a1a1a;
      border-color: #e05c5c;
      color: #e05c5c;
      animation: pulse 1.2s ease-in-out infinite;
    }
    #mic-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(224, 92, 92, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(224, 92, 92, 0); }
    }

    #tts-toggle {
      background: none;
      border: 1px solid #2e2e30;
      color: #666;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #tts-toggle.active { color: #5eba7d; border-color: #5eba7d; }
    #tts-toggle:hover { color: #e8e8e8; border-color: #555; }
  </style>
</head>
<body>

<!-- ── Setup screen ── -->
<div id="setup">
  <div class="logo">
    <h1>Toastman</h1>
    <p>AI-powered interview practice</p>
  </div>

  <div>
    <label for="interview-prompt">What would you like to practice?</label>
    <textarea id="interview-prompt" placeholder="e.g. Senior software engineer at a fintech startup, focusing on system design and leadership…"></textarea>
    <p class="hint" style="margin-top:8px;">Describe the role, company, or type of interview. The more detail you give, the more targeted the questions.</p>
  </div>

  <button class="start-btn" id="start-btn" disabled>Start Interview</button>
</div>

<!-- ── Chat screen ── -->
<div id="chat">
  <div id="chat-header">
    <span class="title">Interview in Progress</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button id="tts-toggle" title="Read responses aloud">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        Read aloud
      </button>
      <button id="restart-btn">← New Interview</button>
    </div>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Type your answer or press the mic…" rows="1"></textarea>
    <button id="mic-btn" title="Hold to speak">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button id="send-btn" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  let resume = "";
  let messages = [];
  let streaming = false;

  const interviewPrompt = document.getElementById("interview-prompt");
  const startBtn = document.getElementById("start-btn");
  const setupEl = document.getElementById("setup");
  const chatEl = document.getElementById("chat");
  const messagesEl = document.getElementById("messages");
  const userInput = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  const micBtn = document.getElementById("mic-btn");
  const ttsToggle = document.getElementById("tts-toggle");
  const restartBtn = document.getElementById("restart-btn");

  // ── Text-to-speech ──
  let ttsEnabled = false;
  let currentUtterance = null;

  ttsToggle.addEventListener("click", () => {
    ttsEnabled = !ttsEnabled;
    ttsToggle.classList.toggle("active", ttsEnabled);
    if (!ttsEnabled) window.speechSynthesis.cancel();
  });

  function speak(text) {
    if (!ttsEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    currentUtterance = new SpeechSynthesisUtterance(text);
    currentUtterance.rate = 1.05;
    currentUtterance.pitch = 1;
    window.speechSynthesis.speak(currentUtterance);
  }

  // ── Speech-to-text ──
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let recognizing = false;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = "en-US";

    let baseText = "";

    recognition.onstart = () => {
      recognizing = true;
      micBtn.classList.add("listening");
      baseText = userInput.value;
    };

    recognition.onresult = (e) => {
      let interim = "";
      let final = "";
      for (const result of e.results) {
        if (result.isFinal) final += result[0].transcript;
        else interim += result[0].transcript;
      }
      userInput.value = (baseText + (baseText && (final || interim) ? " " : "") + (final || interim)).trim();
      userInput.style.height = "44px";
      userInput.style.height = Math.min(userInput.scrollHeight, 180) + "px";
      sendBtn.disabled = !userInput.value.trim() || streaming;
    };

    recognition.onend = () => {
      recognizing = false;
      micBtn.classList.remove("listening");
    };

    recognition.onerror = (e) => {
      recognizing = false;
      micBtn.classList.remove("listening");
    };

    micBtn.addEventListener("click", () => {
      if (streaming) return;
      if (recognizing) {
        recognition.stop();
      } else {
        window.speechSynthesis.cancel();
        recognition.start();
      }
    });
  } else {
    micBtn.disabled = true;
    micBtn.title = "Speech recognition not supported in this browser";
  }

  interviewPrompt.addEventListener("input", () => {
    startBtn.disabled = !interviewPrompt.value.trim();
  });

  // Start interview
  startBtn.addEventListener("click", () => {
    resume = interviewPrompt.value.trim();
    if (!resume) return;
    messages = [];
    messagesEl.innerHTML = "";
    setupEl.style.display = "none";
    chatEl.style.display = "flex";
    sendInitialGreeting();
  });

  restartBtn.addEventListener("click", () => {
    window.speechSynthesis.cancel();
    if (recognizing) recognition?.stop();
    chatEl.style.display = "none";
    setupEl.style.display = "flex";
    resume = "";
    interviewPrompt.value = "";
    messages = [];
    startBtn.disabled = true;
  });

  // Auto-resize textarea
  userInput.addEventListener("input", () => {
    userInput.style.height = "44px";
    userInput.style.height = Math.min(userInput.scrollHeight, 180) + "px";
    sendBtn.disabled = !userInput.value.trim() || streaming;
  });

  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  function addMessage(role, text, isStreaming = false) {
    const div = document.createElement("div");
    div.className = `msg ${role}${isStreaming ? " streaming" : ""}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendInitialGreeting() {
    // Send an empty first user turn so Claude will greet us
    messages.push({ role: "user", content: "Hello, I'm ready for the interview." });
    await streamResponse();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || streaming) return;
    userInput.value = "";
    userInput.style.height = "44px";
    sendBtn.disabled = true;

    addMessage("user", text);
    messages.push({ role: "user", content: text });
    await streamResponse();
  }

  async function streamResponse() {
    streaming = true;
    sendBtn.disabled = true;
    micBtn.disabled = true;
    const msgDiv = addMessage("assistant", "", true);

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages, resume }),
      });

      if (!res.ok) {
        const err = await res.json();
        msgDiv.textContent = `Error: ${err.error}`;
        msgDiv.classList.remove("streaming");
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let fullText = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const payload = line.slice(6);
          if (payload === "[DONE]") break;
          try {
            const { text, error } = JSON.parse(payload);
            if (error) { msgDiv.textContent = `Error: ${error}`; break; }
            if (text) {
              fullText += text;
              msgDiv.textContent = fullText;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch {}
        }
      }

      msgDiv.classList.remove("streaming");
      if (fullText) {
        messages.push({ role: "assistant", content: fullText });
        speak(fullText);
      }
    } catch (err) {
      msgDiv.textContent = "Connection error — please try again.";
      msgDiv.classList.remove("streaming");
    } finally {
      streaming = false;
      micBtn.disabled = false;
      sendBtn.disabled = !userInput.value.trim();
    }
  }
</script>
</body>
</html>
